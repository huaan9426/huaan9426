<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Huaan cinematic profile card</title>
  <desc id="desc">A restrained cinematic title card for Huaan, with dark background, gold beam, rain lines, and Chinese typography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07080D"/>
      <stop offset="0.42" stop-color="#11100D"/>
      <stop offset="1" stop-color="#06070B"/>
    </linearGradient>
    <radialGradient id="stage" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 210) rotate(90) scale(230 560)">
      <stop stop-color="#C8A85B" stop-opacity="0.32"/>
      <stop offset="0.45" stop-color="#4E3D21" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#06070B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="light" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#C8A85B" stop-opacity="0"/>
      <stop offset="0.48" stop-color="#C8A85B" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#FFF0B8" stop-opacity="0.82"/>
      <stop offset="0.52" stop-color="#C8A85B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#C8A85B" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grain" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M0 63H64" stroke="#FFFFFF" stroke-opacity="0.026"/>
      <circle cx="10" cy="18" r="0.6" fill="#FFFFFF" fill-opacity="0.05"/>
      <circle cx="45" cy="39" r="0.5" fill="#C8A85B" fill-opacity="0.045"/>
    </pattern>
    <style>
      .name { font: 700 94px Georgia, "Times New Roman", serif; letter-spacing: 16px; }
      .seal { font: 700 118px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 14px; }
      .line { font: 500 25px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 5px; }
      .meta { font: 600 16px "JetBrains Mono", Consolas, monospace; letter-spacing: 7px; }
      .fine { font: 500 15px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 3px; }
      .rain { animation: rain 8s linear infinite; }
      .beam { animation: beam 5.8s ease-in-out infinite; transform-origin: center; }
      .breath { animation: breath 4.6s ease-in-out infinite; }
      .enter { animation: enter 1.2s ease both; }
      @keyframes rain { from { transform: translateY(-70px); } to { transform: translateY(70px); } }
      @keyframes beam { 0%,100% { opacity: .18; transform: translateX(-220px); } 50% { opacity: .78; transform: translateX(220px); } }
      @keyframes breath { 0%,100% { opacity: .26; } 50% { opacity: .74; } }
      @keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#stage)"/>
  <rect width="1200" height="420" fill="url(#grain)"/>

  <g class="rain" opacity="0.28">
    <path d="M85 -80L5 500M215 -80L135 500M345 -80L265 500M475 -80L395 500M605 -80L525 500M735 -80L655 500M865 -80L785 500M995 -80L915 500M1125 -80L1045 500" stroke="#8B8F99" stroke-opacity="0.2"/>
  </g>

  <rect y="203" width="1200" height="4" fill="url(#light)" filter="url(#glow)" class="beam"/>
  <rect x="70" y="70" width="1060" height="280" rx="22" stroke="#C8A85B" stroke-opacity="0.13"/>
  <rect x="96" y="94" width="1008" height="232" rx="16" stroke="#FFFFFF" stroke-opacity="0.055"/>

  <text x="600" y="134" text-anchor="middle" fill="#C8A85B" fill-opacity="0.12" class="seal breath">影</text>
  <text x="600" y="178" text-anchor="middle" fill="#F1ECE2" class="name enter">HUAAN</text>
  <text x="600" y="228" text-anchor="middle" fill="#C8A85B" class="meta enter">AI CODING · AUTOMATION · PRACTICAL CINEMA</text>
  <text x="600" y="276" text-anchor="middle" fill="#D8D1C3" class="line enter">把工具做成镜头：克制、准确、可回放。</text>
  <text x="600" y="315" text-anchor="middle" fill="#8F96A3" class="fine enter">walle-ai-trash · reversible cleanup for AI coding leftovers</text>

  <g transform="translate(96 101)" opacity="0.72">
    <circle cx="0" cy="0" r="4" fill="#C94B4B"/>
    <text x="14" y="5" fill="#C94B4B" font-family="Consolas, monospace" font-size="13" letter-spacing="2">REC</text>
  </g>
  <g transform="translate(980 101)" opacity="0.48">
    <text fill="#8B949E" font-family="Consolas, monospace" font-size="13" letter-spacing="2">PROFILE / TAKE 01</text>
  </g>
</svg>
