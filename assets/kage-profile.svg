<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">huaan9426 profile title card</title>
  <desc id="desc">A dark cinematic title card with gold light, Chinese typography, rain lines, and subtle motion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06070B"/>
      <stop offset="0.48" stop-color="#11110F"/>
      <stop offset="1" stop-color="#090A0D"/>
    </linearGradient>
    <radialGradient id="amber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(590 210) rotate(90) scale(240 540)">
      <stop stop-color="#D6B765" stop-opacity="0.38"/>
      <stop offset="0.38" stop-color="#7C6231" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#06070B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D6B765" stop-opacity="0"/>
      <stop offset="0.47" stop-color="#D6B765" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#FFE6A3" stop-opacity="0.86"/>
      <stop offset="0.53" stop-color="#D6B765" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D6B765" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M0 79H80" stroke="#FFFFFF" stroke-opacity="0.028"/>
      <path d="M79 0V80" stroke="#FFFFFF" stroke-opacity="0.022"/>
      <circle cx="11" cy="17" r="0.7" fill="#FFFFFF" fill-opacity="0.06"/>
      <circle cx="51" cy="43" r="0.6" fill="#D6B765" fill-opacity="0.05"/>
      <circle cx="72" cy="10" r="0.5" fill="#FFFFFF" fill-opacity="0.04"/>
    </pattern>
    <style>
      .latin { font: 700 88px Georgia, "Times New Roman", serif; letter-spacing: 14px; }
      .han { font: 700 116px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 12px; }
      .sub { font: 400 25px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 6px; }
      .mono { font: 600 17px "JetBrains Mono", Consolas, monospace; letter-spacing: 8px; }
      .small { font: 500 18px "Noto Serif CJK SC", "Songti SC", SimSun, serif; letter-spacing: 3px; }
      .rain { animation: rain 8s linear infinite; }
      .beam { animation: sweep 5.4s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 4.8s ease-in-out infinite; }
      .fadeIn { animation: fadeIn 1.4s ease both; }
      @keyframes rain { from { transform: translateY(-80px); } to { transform: translateY(80px); } }
      @keyframes sweep { 0%, 100% { opacity: .18; transform: translateX(-240px); } 50% { opacity: .8; transform: translateX(240px); } }
      @keyframes pulse { 0%, 100% { opacity: .42; } 50% { opacity: .92; } }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </defs>

  <rect width="1200" height="430" fill="url(#bg)"/>
  <rect width="1200" height="430" fill="url(#amber)"/>
  <rect width="1200" height="430" fill="url(#grain)"/>

  <g opacity="0.3" class="rain">
    <path d="M70 -80L-5 520M190 -80L115 520M310 -80L235 520M430 -80L355 520M550 -80L475 520M670 -80L595 520M790 -80L715 520M910 -80L835 520M1030 -80L955 520M1150 -80L1075 520" stroke="#7B7F8A" stroke-opacity="0.22"/>
  </g>

  <rect y="208" width="1200" height="5" fill="url(#beam)" filter="url(#softGlow)" class="beam"/>
  <rect x="72" y="75" width="1056" height="280" rx="24" stroke="#D6B765" stroke-opacity="0.14"/>
  <rect x="92" y="94" width="1016" height="242" rx="18" stroke="#FFFFFF" stroke-opacity="0.055"/>

  <text x="600" y="130" text-anchor="middle" fill="#D6B765" fill-opacity="0.13" class="han pulse">影</text>
  <text x="600" y="177" text-anchor="middle" fill="#E8E1D5" class="latin fadeIn">HUAAN</text>
  <text x="600" y="228" text-anchor="middle" fill="#CBB16A" class="mono fadeIn">AI CODING  ·  AUTOMATION  ·  CINEMATIC TOOLS</text>
  <text x="600" y="281" text-anchor="middle" fill="#D8D0C1" class="sub fadeIn">光在可读处停留，工具在可回溯处成形。</text>
  <text x="600" y="322" text-anchor="middle" fill="#9DA3AE" class="small fadeIn">311 contributions in the last year · public work curated, private drafts reserved</text>

  <g transform="translate(95 102)" opacity="0.72">
    <circle cx="0" cy="0" r="4" fill="#D95D5D"/>
    <text x="14" y="5" fill="#D95D5D" font-family="Consolas, monospace" font-size="13" letter-spacing="2">REC</text>
  </g>
  <g transform="translate(993 102)" opacity="0.5">
    <text fill="#8B949E" font-family="Consolas, monospace" font-size="13" letter-spacing="2">00:03:11:00</text>
  </g>
</svg>
